name: Deploy agenthook.store Static Website

on:
  workflow_dispatch:
  push:
    branches: ["master"]

jobs:
  deploy-website:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy Worker + website assets to Cloudflare
        run: |
          set -euo pipefail
          cd cloudflare-worker-root
          npx -y wrangler deploy
