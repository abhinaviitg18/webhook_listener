name: Deploy AgentHook Mail Receipt Guard

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      MAIL_RECEIPT_GUARD_LAMBDA_FUNCTION_NAME: agenthook-mail-receipt-guard
      APP_ENV_SSM_PARAM: /agenthook/prod/env
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy mail receipt guard lambda
        run: |
          set -euo pipefail
          bash scripts/aws/mail_receipt_guard_lambda_deploy.sh
