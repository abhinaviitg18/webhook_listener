name: Deploy AWS EC2

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: cd web && npm install && npm run build && mkdir -p ../internal/ui/dist && cp -r dist/* ../internal/ui/dist/

      - name: Run tests
        run: go test ./cmd/... ./internal/...

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS Secrets In Runner
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
        run: |
          set -euo pipefail
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          aws sts get-caller-identity

      - name: Generate ephemeral SSH key
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/hookweb_ci_key -N ""

      - name: Open EC2 Instance Connect window
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_AZ: ${{ secrets.EC2_AVAILABILITY_ZONE }}
        run: |
          set -euo pipefail
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "${INSTANCE_ID}" \
            --availability-zone "${EC2_AZ}" \
            --instance-os-user ec2-user \
            --ssh-public-key "file:///tmp/hookweb_ci_key.pub"

      - name: Deploy on EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_PUBLIC_IP }}
          GITHUB_SHA: ${{ github.sha }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i /tmp/hookweb_ci_key ec2-user@"${EC2_HOST}" "
            set -euo pipefail
            cd /opt/agenthook/repo
            git fetch --all --tags
            git checkout ${GITHUB_SHA}
            sudo AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" APP_ENV_SSM_PARAM=/agenthook/prod/env AWS_REGION=us-east-1 /opt/agenthook/repo/scripts/aws/ec2_deploy.sh
          "
