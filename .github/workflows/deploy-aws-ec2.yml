name: Deploy AWS EC2

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          APP_ENV_SSM_PARAM: ${{ secrets.APP_ENV_SSM_PARAM }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          if [[ -z "${INSTANCE_ID}" || -z "${APP_ENV_SSM_PARAM}" ]]; then
            echo "EC2_INSTANCE_ID or APP_ENV_SSM_PARAM secret missing"
            exit 1
          fi

          cat >/tmp/ssm-commands.json <<JSON
          {
            "commands": [
              "set -euo pipefail",
              "if [ ! -d /opt/hookweb/repo/.git ]; then sudo git clone https://github.com/${GITHUB_REPOSITORY}.git /opt/hookweb/repo; fi",
              "cd /opt/hookweb/repo",
              "sudo git fetch --all --tags",
              "sudo git checkout ${GITHUB_SHA}",
              "sudo APP_ENV_SSM_PARAM=${APP_ENV_SSM_PARAM} bash scripts/aws/ec2_deploy.sh"
            ]
          }
          JSON

          CMD_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "hookweb deploy ${GITHUB_SHA}" \
            --parameters "file:///tmp/ssm-commands.json" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${CMD_ID}"
          aws ssm wait command-executed \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}"

          aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
