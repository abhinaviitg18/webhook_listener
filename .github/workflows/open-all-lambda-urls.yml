name: Open All Lambda URLs

on:
  workflow_dispatch:

jobs:
  open-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open Function URLs For All Lambdas
        run: |
          set -euo pipefail
          bash scripts/aws/open_all_lambda_urls.sh | tee open-all-lambda-urls.txt

      - name: Upload URL list
        uses: actions/upload-artifact@v4
        with:
          name: open-all-lambda-urls
          path: open-all-lambda-urls.txt
