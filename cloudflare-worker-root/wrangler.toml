name = "agenthook-root-static"
main = "index.js"
compatibility_date = "2026-04-24"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "agenthook.store/*", zone_name = "agenthook.store" },
  { pattern = "app.agenthook.store/*", zone_name = "agenthook.store" }
]

[vars]
SCALEKIT_BASE_URL = "https://hookweb.scalekit.com"
APP_REDIRECT_BASE = "https://app.agenthook.store"

[assets]
directory = "../web/dist"
binding = "ASSETS"
